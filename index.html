<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Discipline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0F0F0F;
      --card:      #1A1A1A;
      --purple:    #6C63FF;
      --success:   #00C48C;
      --danger:    #FF6B6B;
      --warning:   #FFA500;
      --text:      #FFFFFF;
      --secondary: #A0A0A0;
      --border:    #2A2A2A;
      --r-card:    16px;
      --r-bubble:  18px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    body { display: flex; justify-content: center; }
    .hidden { display: none !important; }

    /* ── ONBOARDING ─────────────────────────────────────────────────────────── */
    #onboarding {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
    }
    .ob-step { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; text-align: center; animation: fadeUp 0.25s ease; }
    .ob-step.active { display: flex; }
    .ob-heading { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .ob-sub     { color: var(--secondary); font-size: 0.9rem; margin-bottom: 2rem; }
    .ob-input {
      width: 100%; background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--r-card); color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 1rem; padding: 1rem 1.25rem; resize: none;
      transition: border-color 200ms; margin-bottom: 1rem;
    }
    .ob-input:focus { outline: none; border-color: var(--purple); }
    .ob-input::placeholder { color: var(--secondary); }
    .btn {
      background: var(--purple); border: none; border-radius: var(--r-card);
      color: #fff; cursor: pointer; font-family: 'Inter', sans-serif;
      font-size: 1rem; font-weight: 600; padding: 0.9rem 1.5rem; width: 100%;
      transition: opacity 200ms, transform 100ms;
    }
    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .style-cards { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; margin-bottom: 1.25rem; }
    .style-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--r-card); cursor: pointer; padding: 1.1rem 1.25rem;
      text-align: left; width: 100%; color: var(--text); font-family: 'Inter', sans-serif;
      transition: border-color 200ms, background 200ms, transform 100ms;
    }
    .style-card:hover   { border-color: var(--purple); }
    .style-card:active  { transform: scale(0.98); }
    .style-card.selected { border-color: var(--purple); background: rgba(108,99,255,0.12); }
    .style-card-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; color: var(--purple); margin-bottom: 0.3rem; }
    .style-card-desc  { font-size: 0.88rem; color: var(--secondary); }
    .checkmark-circle {
      width: 80px; height: 80px; border-radius: 50%; background: var(--success);
      display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 1.5rem;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .goal-echo { color: var(--purple); font-weight: 600; font-size: 0.95rem; margin-top: 0.5rem; }

    /* ── MAIN APP ───────────────────────────────────────────────────────────── */
    #app { width: 100%; max-width: 480px; height: 100vh; height: 100dvh; display: flex; flex-direction: column; }

    /* ── HEADER ─────────────────────────────────────────────────────────────── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border); background: var(--bg);
    }
    .app-name { font-size: 0.95rem; font-weight: 800; letter-spacing: 0.18em; color: var(--purple); }
    #streak-btn {
      background: rgba(0,196,140,0.1); border: 1px solid rgba(0,196,140,0.25);
      border-radius: 20px; color: var(--success); cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600;
      padding: 0.35rem 0.85rem; transition: background 200ms;
    }
    #streak-btn:hover { background: rgba(0,196,140,0.2); }

    /* ── STATS DRAWER ───────────────────────────────────────────────────────── */
    #stats-drawer {
      position: fixed; top: 0; left: 50%;
      transform: translateX(-50%) translateY(-110%);
      width: 100%; max-width: 480px;
      background: var(--card); border-bottom: 1px solid var(--border);
      border-radius: 0 0 var(--r-card) var(--r-card);
      padding: 2.25rem 1.5rem 1.5rem;
      z-index: 50; transition: transform 200ms ease;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    #stats-drawer.open { transform: translateX(-50%) translateY(0); }
    .drawer-close {
      position: absolute; top: 0.85rem; right: 1rem;
      background: var(--border); border: none; border-radius: 50%;
      color: var(--secondary); cursor: pointer; font-size: 0.8rem;
      height: 28px; width: 28px; transition: background 200ms;
    }
    .drawer-close:hover { background: #3a3a3a; }
    .drawer-streak-num   { font-size: 3.5rem; font-weight: 800; color: var(--success); text-align: center; line-height: 1; }
    .drawer-streak-label { text-align: center; color: var(--secondary); font-size: 0.78rem; margin-bottom: 1.1rem; }
    .drawer-motivation {
      background: var(--bg); border-left: 3px solid var(--purple);
      border-radius: 8px; color: var(--secondary); font-size: 0.83rem;
      font-style: italic; padding: 0.7rem 1rem; margin-bottom: 1.1rem;
    }
    .drawer-rows { display: flex; flex-direction: column; gap: 0.55rem; }
    .drawer-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border-radius: 10px; padding: 0.65rem 1rem;
    }
    .drawer-label { color: var(--secondary); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .drawer-value { font-size: 0.88rem; font-weight: 500; max-width: 60%; text-align: right; }
    .style-badge { border-radius: 20px; font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.65rem; }
    .style-badge.tough-love { background: rgba(255,107,107,0.15); color: var(--danger); }
    .style-badge.balanced   { background: rgba(108,99,255,0.15);  color: var(--purple); }
    .style-badge.gentle     { background: rgba(0,196,140,0.15);   color: var(--success); }

    /* ── SCREENS ────────────────────────────────────────────────────────────── */
    .screen { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }

    /* ── CHAT SCREEN ────────────────────────────────────────────────────────── */
    #mood-selector {
      flex-shrink: 0; background: var(--card);
      border-bottom: 1px solid var(--border); padding: 0.9rem 1.1rem; display: none;
    }
    #mood-selector.show { display: block; }
    .mood-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .mood-heading { font-size: 0.82rem; font-weight: 600; }
    .mood-dismiss { background: none; border: none; color: var(--secondary); cursor: pointer; font-size: 0.95rem; padding: 0.2rem; }
    .mood-emojis { display: flex; gap: 0.45rem; }
    .mood-btn {
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
      cursor: pointer; display: flex; flex-direction: column; align-items: center;
      flex: 1; padding: 0.55rem 0.2rem; transition: border-color 200ms, background 200ms;
    }
    .mood-btn:hover    { border-color: var(--purple); }
    .mood-btn.selected { border-color: var(--purple); background: rgba(108,99,255,0.12); }
    .mood-emoji { font-size: 1.4rem; line-height: 1; margin-bottom: 0.2rem; }
    .mood-label { color: var(--secondary); font-size: 0.58rem; font-weight: 500; text-align: center; }

    #checkin-card {
      flex-shrink: 0; margin: 0.9rem 1rem 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-card); padding: 1.25rem; display: none; text-align: center;
    }
    #checkin-card.show { display: block; }
    .checkin-flame { font-size: 1.75rem; margin-bottom: 0.4rem; }
    .checkin-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.25rem; }
    .checkin-sub   { color: var(--secondary); font-size: 0.8rem; margin-bottom: 0.9rem; }
    .btn-sm {
      background: var(--purple); border: none; border-radius: 12px;
      color: #fff; cursor: pointer; font-family: 'Inter', sans-serif;
      font-size: 0.88rem; font-weight: 600; padding: 0.65rem 1.25rem;
      width: 100%; transition: opacity 200ms;
    }
    .btn-sm:hover { opacity: 0.88; }

    #messages {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.75rem; scroll-behavior: smooth;
    }
    .msg { display: flex; flex-direction: column; max-width: 80%; animation: fadeUp 0.2s ease; }
    .msg.user  { align-self: flex-end;  align-items: flex-end; }
    .msg.coach { align-self: flex-start; align-items: flex-start; }
    .bubble {
      border-radius: var(--r-bubble); font-size: 0.92rem; line-height: 1.55;
      padding: 0.75rem 1rem; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user  .bubble { background: var(--purple); color: #fff; border-bottom-right-radius: 4px; }
    .msg.coach .bubble { background: var(--card); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
    .msg.coach .bubble.error { border-color: var(--danger); color: var(--danger); }
    .msg-pills { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.3rem; }
    .pill { border-radius: 6px; font-size: 0.63rem; font-weight: 600; letter-spacing: 0.04em; padding: 0.18rem 0.5rem; text-transform: uppercase; }
    .pill-provider            { background: rgba(255,255,255,0.07); color: var(--secondary); }
    .pill-intent              { background: rgba(255,255,255,0.07); color: var(--secondary); }
    .pill-intent.checkin      { background: rgba(99,149,255,0.15);  color: #6395FF; }
    .pill-intent.motivation   { background: rgba(0,196,140,0.15);   color: var(--success); }
    .pill-intent.lapse        { background: rgba(255,165,0,0.15);   color: var(--warning); }
    .pill-intent.relapse      { background: rgba(255,107,107,0.15); color: var(--danger); }
    .pill-intent.task_request { background: rgba(108,99,255,0.15);  color: var(--purple); }
    .pill-intent.task_update  { background: rgba(0,196,140,0.15);   color: var(--success); }
    .dots-bubble {
      align-self: flex-start; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-bubble); border-bottom-left-radius: 4px;
      display: flex; gap: 5px; padding: 0.75rem 1rem; animation: fadeUp 0.2s ease;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--secondary); animation: dotPulse 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    #bottom-bar {
      flex-shrink: 0; display: flex; align-items: flex-end; gap: 0.6rem;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 0.75rem 1rem; padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
    }
    #msg-input {
      flex: 1; background: var(--card); border: 1.5px solid var(--border);
      border-radius: 20px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.95rem; line-height: 1.5; max-height: 120px;
      overflow-y: auto; padding: 0.6rem 1rem; resize: none; transition: border-color 200ms;
    }
    #msg-input:focus { outline: none; border-color: var(--purple); }
    #msg-input::placeholder { color: var(--secondary); }
    #send-btn {
      align-items: center; background: var(--purple); border: none; border-radius: 50%;
      color: #fff; cursor: pointer; display: flex; flex-shrink: 0;
      font-size: 1.1rem; font-weight: 700; height: 40px; width: 40px; justify-content: center;
      transition: opacity 200ms, transform 100ms;
    }
    #send-btn:hover   { opacity: 0.85; }
    #send-btn:active  { transform: scale(0.92); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── SHARED SCROLL SCREENS ──────────────────────────────────────────────── */
    .scroll-screen { overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; }

    .section-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em;
      color: var(--secondary); text-transform: uppercase; padding: 0.5rem 0 0.1rem;
    }

    .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 3.5rem 1.5rem; gap: 0.7rem; }
    .empty-icon  { font-size: 2.5rem; }
    .empty-title { font-size: 1rem; font-weight: 700; }
    .empty-sub   { font-size: 0.83rem; color: var(--secondary); line-height: 1.55; }

    /* ── COMMITMENT CARDS ───────────────────────────────────────────────────── */
    .cc {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-card); padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: 0.6rem;
      animation: fadeUp 0.2s ease; transition: opacity 300ms;
    }
    .cc.logged { opacity: 0.55; }
    .cc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
    .cc-top-left { display: flex; align-items: flex-start; gap: 0.45rem; flex: 1; min-width: 0; }
    .cc-type {
      flex-shrink: 0; margin-top: 2px;
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; border-radius: 5px; padding: 0.18rem 0.45rem;
    }
    .cc-type.do       { background: rgba(108,99,255,0.2); color: var(--purple); }
    .cc-type.abstain  { background: rgba(255,107,107,0.2); color: var(--danger); }
    .cc-type.one-time { background: rgba(0,196,140,0.2); color: var(--success); }
    .cc-title  { font-size: 0.92rem; font-weight: 600; line-height: 1.3; }
    .cc-streak { font-size: 0.8rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .cc-streak.do       { color: var(--success); }
    .cc-streak.abstain  { color: var(--warning); }
    .cc-streak.one-time { color: var(--secondary); }
    .cc-bottom { display: flex; align-items: center; justify-content: space-between; }
    .cc-freq   { font-size: 0.72rem; color: var(--secondary); }
    .cc-actions { display: flex; gap: 0.4rem; }
    .cc-btn {
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 600;
      padding: 0.38rem 0.72rem; transition: opacity 150ms, transform 100ms;
    }
    .cc-btn:active { transform: scale(0.94); }
    .cc-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .cc-btn.done   { background: rgba(0,196,140,0.15); color: var(--success); }
    .cc-btn.lapsed { background: rgba(255,107,107,0.15); color: var(--danger); }
    .cc-btn.done:not(:disabled):hover   { background: rgba(0,196,140,0.28); }
    .cc-btn.lapsed:not(:disabled):hover { background: rgba(255,107,107,0.28); }
    .cc-status-chip { font-size: 0.73rem; font-weight: 600; border-radius: 10px; padding: 0.35rem 0.72rem; }
    .cc-status-chip.completed { background: rgba(0,196,140,0.12); color: var(--success); }
    .cc-status-chip.lapsed    { background: rgba(255,107,107,0.12); color: var(--danger); }
    .cc-status-chip.skipped   { background: rgba(160,160,160,0.1); color: var(--secondary); }

    /* ── GOALS SCREEN ───────────────────────────────────────────────────────── */
    .goal-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-card); padding: 1rem 1.1rem;
      display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
      animation: fadeUp 0.2s ease;
    }
    .goal-card-title { font-size: 0.95rem; font-weight: 600; flex: 1; }
    .goal-remove-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--secondary); cursor: pointer; font-size: 0.75rem;
      padding: 0.3rem 0.6rem; flex-shrink: 0; transition: border-color 200ms, color 200ms;
    }
    .goal-remove-btn:hover { border-color: var(--danger); color: var(--danger); }

    .add-goal-row {
      display: flex; gap: 0.6rem; margin-top: 0.4rem;
    }
    .add-goal-input {
      flex: 1; background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--r-card); color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.92rem; padding: 0.7rem 1rem; transition: border-color 200ms;
    }
    .add-goal-input:focus { outline: none; border-color: var(--purple); }
    .add-goal-input::placeholder { color: var(--secondary); }
    .add-goal-btn {
      background: var(--purple); border: none; border-radius: var(--r-card);
      color: #fff; cursor: pointer; font-family: 'Inter', sans-serif;
      font-size: 0.88rem; font-weight: 600; padding: 0.7rem 1.1rem;
      transition: opacity 200ms; white-space: nowrap; flex-shrink: 0;
    }
    .add-goal-btn:hover    { opacity: 0.88; }
    .add-goal-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* goal badge on commitment cards */
    .cc-goal-badge {
      font-size: 0.65rem; font-weight: 600; color: var(--purple);
      background: rgba(108,99,255,0.12); border-radius: 5px;
      padding: 0.12rem 0.45rem; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 140px;
    }

    /* ── SKELETON ───────────────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, #222 50%, var(--card) 75%);
      background-size: 200% 100%; animation: shimmer 1.3s infinite;
      border-radius: var(--r-card); height: 82px;
    }

    /* ── TAB BAR ────────────────────────────────────────────────────────────── */
    #tab-bar {
      flex-shrink: 0; display: flex;
      background: var(--bg); border-top: 1px solid var(--border);
      padding-bottom: max(0.4rem, env(safe-area-inset-bottom));
    }
    .tab-btn {
      flex: 1; background: none; border: none; color: var(--secondary);
      cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.22rem;
      padding: 0.65rem 0.5rem 0.45rem; font-family: 'Inter', sans-serif;
      position: relative; transition: color 150ms;
    }
    .tab-btn.active { color: var(--purple); }
    .tab-icon  { font-size: 1.25rem; line-height: 1; }
    .tab-label { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .tab-badge {
      position: absolute; top: 0.38rem; right: calc(50% - 0.75rem - 8px);
      background: var(--danger); color: #fff;
      font-size: 0.58rem; font-weight: 700;
      min-width: 15px; height: 15px; border-radius: 8px; padding: 0 0.28rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── ANIMATIONS ─────────────────────────────────────────────────────────── */
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn   { 0% { transform: scale(0) rotate(-15deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
    @keyframes dotPulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  </style>
</head>
<body>

  <!-- ── STATS DRAWER ─────────────────────────────────────────────────────── -->
  <div id="stats-drawer">
    <button class="drawer-close" id="drawer-close">✕</button>
    <div class="drawer-streak-num" id="drawer-streak">0</div>
    <div class="drawer-streak-label">🔥 day streak</div>
    <div class="drawer-motivation" id="drawer-motivation"></div>
    <div class="drawer-rows">
      <div class="drawer-row">
        <span class="drawer-label">Style</span>
        <span class="drawer-value"><span id="drawer-style" class="style-badge">—</span></span>
      </div>
    </div>
  </div>

  <!-- ── ONBOARDING ───────────────────────────────────────────────────────── -->
  <div id="onboarding">
    <div id="ob-1" class="ob-step active">
      <h1 class="ob-heading">What's your goal?</h1>
      <p class="ob-sub">Be specific. Vague goals get vague results.</p>
      <textarea id="ob-goal" class="ob-input" rows="3" placeholder="e.g. Run 5km every day without skipping"></textarea>
      <button id="ob-continue" class="btn">Continue</button>
    </div>
    <div id="ob-2" class="ob-step">
      <h1 class="ob-heading">How should I coach you?</h1>
      <p class="ob-sub">Choose your coaching style.</p>
      <div class="style-cards">
        <button class="style-card" data-style="tough love">
          <div class="style-card-title">TOUGH LOVE</div>
          <div class="style-card-desc">Direct. No excuses. I'll push you hard.</div>
        </button>
        <button class="style-card" data-style="balanced">
          <div class="style-card-title">BALANCED</div>
          <div class="style-card-desc">Honest but warm. Realistic and encouraging.</div>
        </button>
        <button class="style-card" data-style="gentle">
          <div class="style-card-title">GENTLE</div>
          <div class="style-card-desc">Patient and compassionate. Self-compassion first.</div>
        </button>
      </div>
      <button id="ob-letsgo" class="btn hidden">Let's Go</button>
    </div>
    <div id="ob-3" class="ob-step">
      <div class="checkmark-circle">✓</div>
      <h1 class="ob-heading">You're all set.</h1>
      <p class="goal-echo" id="ob-echo"></p>
    </div>
  </div>

  <!-- ── MAIN APP ──────────────────────────────────────────────────────────── -->
  <div id="app" class="hidden">
    <header id="header">
      <span class="app-name">DISCIPLINE</span>
      <button id="streak-btn">🔥 <span id="streak-count">0</span></button>
    </header>

    <!-- Chat Screen -->
    <div id="screen-chat" class="screen">
      <div id="mood-selector">
        <div class="mood-header">
          <span class="mood-heading">How are you showing up today?</span>
          <button class="mood-dismiss" id="mood-dismiss">✕</button>
        </div>
        <div class="mood-emojis">
          <button class="mood-btn" data-mood="Struggling" data-emoji="😫"><span class="mood-emoji">😫</span><span class="mood-label">Struggling</span></button>
          <button class="mood-btn" data-mood="Low"        data-emoji="😕"><span class="mood-emoji">😕</span><span class="mood-label">Low</span></button>
          <button class="mood-btn" data-mood="Neutral"    data-emoji="😐"><span class="mood-emoji">😐</span><span class="mood-label">Neutral</span></button>
          <button class="mood-btn" data-mood="Good"       data-emoji="🙂"><span class="mood-emoji">🙂</span><span class="mood-label">Good</span></button>
          <button class="mood-btn" data-mood="Strong"     data-emoji="💪"><span class="mood-emoji">💪</span><span class="mood-label">Strong</span></button>
        </div>
      </div>
      <div id="checkin-card">
        <div class="checkin-flame">🔥</div>
        <div class="checkin-title">Check in for today</div>
        <div class="checkin-sub">How's your discipline holding up?</div>
        <button class="btn-sm" id="checkin-btn">Start Check-in</button>
      </div>
      <div id="messages"></div>
      <div id="bottom-bar">
        <textarea id="msg-input" placeholder="Message your coach…" rows="1"></textarea>
        <button id="send-btn">→</button>
      </div>
    </div>

    <!-- Commitments Screen -->
    <div id="screen-commitments" class="screen hidden scroll-screen"></div>

    <!-- Goals Screen -->
    <div id="screen-goals" class="screen hidden scroll-screen"></div>

    <!-- Tab Bar -->
    <nav id="tab-bar">
      <button class="tab-btn active" data-tab="chat">
        <span class="tab-icon">💬</span>
        <span class="tab-label">Chat</span>
      </button>
      <button class="tab-btn" data-tab="commitments" id="tab-commitments-btn">
        <span class="tab-icon">✓</span>
        <span class="tab-label">Habits</span>
        <span class="tab-badge hidden" id="chase-badge">0</span>
      </button>
      <button class="tab-btn" data-tab="goals">
        <span class="tab-icon">🎯</span>
        <span class="tab-label">Goals</span>
      </button>
    </nav>
  </div>

  <script>
    const API   = 'http://localhost:8000';
    const today = () => new Date().toISOString().slice(0, 10);

    // ── Persisted state ────────────────────────────────────────────────────────
    let sessionId  = localStorage.getItem('session_id');
    let profile    = JSON.parse(localStorage.getItem('coach_profile') || 'null');
    let streakDays = parseInt(localStorage.getItem('streak_days') || '0', 10);
    let moodPrefix = '';

    if (!sessionId) { sessionId = crypto.randomUUID(); localStorage.setItem('session_id', sessionId); }

    function getTodayLogs() {
      const raw = JSON.parse(localStorage.getItem('today_logs') || '{}');
      return raw._date === today() ? raw : {};
    }
    function setTodayLog(id, status) {
      const logs = getTodayLogs();
      logs._date = today();
      logs[id] = status;
      localStorage.setItem('today_logs', JSON.stringify(logs));
    }

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const $ob         = document.getElementById('onboarding');
    const $app        = document.getElementById('app');
    const $messages   = document.getElementById('messages');
    const $msgInput   = document.getElementById('msg-input');
    const $sendBtn    = document.getElementById('send-btn');
    const $streakBtn  = document.getElementById('streak-btn');
    const $streakCnt  = document.getElementById('streak-count');
    const $drawer     = document.getElementById('stats-drawer');
    const $moodSel    = document.getElementById('mood-selector');
    const $checkin    = document.getElementById('checkin-card');
    const $scrChat    = document.getElementById('screen-chat');
    const $scrComm    = document.getElementById('screen-commitments');
    const $scrGoals   = document.getElementById('screen-goals');
    const $chaseBadge = document.getElementById('chase-badge');

    // ── Boot ───────────────────────────────────────────────────────────────────
    if (profile?.onboarding_complete) {
      $ob.classList.add('hidden');
      $app.classList.remove('hidden');
      initApp();
    } else {
      initOnboarding();
    }

    // ==========================================================================
    // ONBOARDING
    // ==========================================================================
    function initOnboarding() {
      let pendingGoal = '', pendingStyle = '';

      function showStep(n) {
        document.querySelectorAll('.ob-step').forEach(s => s.classList.remove('active'));
        document.getElementById(`ob-${n}`).classList.add('active');
      }

      const $goal = document.getElementById('ob-goal');
      document.getElementById('ob-continue').addEventListener('click', () => {
        const val = $goal.value.trim();
        if (!val) return;
        pendingGoal = val;
        showStep(2);
      });
      $goal.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('ob-continue').click(); }
      });

      const $letsgo = document.getElementById('ob-letsgo');
      document.querySelectorAll('.style-card').forEach(card => {
        card.addEventListener('click', () => {
          document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          pendingStyle = card.dataset.style;
          $letsgo.classList.remove('hidden');
        });
      });

      $letsgo.addEventListener('click', async () => {
        $letsgo.disabled = true;
        $letsgo.textContent = 'Setting up…';
        document.getElementById('ob-echo').textContent = `"${pendingGoal}"`;
        showStep(3);
        profile = { goal: pendingGoal, coaching_style: pendingStyle, onboarding_complete: true };
        localStorage.setItem('coach_profile', JSON.stringify(profile));
        await Promise.all([
          (async () => { try { await apiSend('Hello'); await apiSend(pendingGoal); await apiSend(pendingStyle); } catch (_) {} })(),
          new Promise(r => setTimeout(r, 2000)),
        ]);
        $ob.classList.add('hidden');
        $app.classList.remove('hidden');
        sessionStorage.setItem('first_chat', '1');
        initApp();
      });
    }

    // ==========================================================================
    // APP
    // ==========================================================================
    function initApp() {
      updateHeader();
      checkDailyCards();
      setupDrawer();
      setupMood();
      setupCheckin();
      setupInput();
      setupTabs();
      updateChaseBadge();

      if (sessionStorage.getItem('first_chat') === '1') {
        sessionStorage.removeItem('first_chat');
        sendToChat("Hi, I'm ready to start");
      } else {
        $msgInput.focus();
      }
    }

    function updateHeader() { $streakCnt.textContent = streakDays; }

    // ── Drawer ─────────────────────────────────────────────────────────────────
    function setupDrawer() {
      $streakBtn.addEventListener('click', openDrawer);
      document.getElementById('drawer-close').addEventListener('click', closeDrawer);
      document.addEventListener('click', e => {
        if ($drawer.classList.contains('open') && !$drawer.contains(e.target) && e.target !== $streakBtn) closeDrawer();
      });
    }
    function openDrawer() {
      const lines = [
        { max: 2, text: 'Every expert was once a beginner.' },
        { max: 6, text: "You're building something real." },
        { max: 13, text: 'One week strong. Keep going.' },
        { max: Infinity, text: "You're in the top 1%. Don't stop now." },
      ];
      const line = lines.find(l => streakDays <= l.max);
      document.getElementById('drawer-streak').textContent     = streakDays;
      document.getElementById('drawer-motivation').textContent = `"${line.text}"`;
      const $badge   = document.getElementById('drawer-style');
      const styleKey = (profile?.coaching_style || 'balanced').replace(' ', '-');
      $badge.textContent = profile?.coaching_style || '—';
      $badge.className   = `style-badge ${styleKey}`;
      $drawer.classList.add('open');
    }
    function closeDrawer() { $drawer.classList.remove('open'); }

    // ── Daily cards ────────────────────────────────────────────────────────────
    function checkDailyCards() {
      const t = today();
      if (localStorage.getItem('last_mood_date')    !== t) $moodSel.classList.add('show');
      if (localStorage.getItem('last_message_date') !== t) $checkin.classList.add('show');
    }

    // ── Mood ───────────────────────────────────────────────────────────────────
    function setupMood() {
      document.getElementById('mood-dismiss').addEventListener('click', dismissMood);
      document.querySelectorAll('.mood-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          moodPrefix = `[Mood: ${btn.dataset.mood} ${btn.dataset.emoji}] `;
          dismissMood();
        });
      });
    }
    function dismissMood() { localStorage.setItem('last_mood_date', today()); $moodSel.classList.remove('show'); }

    // ── Check-in ───────────────────────────────────────────────────────────────
    function setupCheckin() {
      document.getElementById('checkin-btn').addEventListener('click', () => {
        $checkin.classList.remove('show');
        sendToChat('Daily check-in');
      });
    }

    // ── Input ──────────────────────────────────────────────────────────────────
    function setupInput() {
      $msgInput.addEventListener('input', () => {
        $msgInput.style.height = 'auto';
        $msgInput.style.height = Math.min($msgInput.scrollHeight, 120) + 'px';
      });
      $msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
      });
      $sendBtn.addEventListener('click', handleSend);
    }
    async function handleSend() {
      const text = $msgInput.value.trim();
      if (!text || $sendBtn.disabled) return;
      $msgInput.value = '';
      $msgInput.style.height = 'auto';
      await sendToChat(text);
      $msgInput.focus();
    }

    // ── Tabs ───────────────────────────────────────────────────────────────────
    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
    }
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      $scrChat.classList.toggle('hidden', name !== 'chat');
      $scrComm.classList.toggle('hidden', name !== 'commitments');
      $scrGoals.classList.toggle('hidden', name !== 'goals');
      if (name === 'commitments') loadCommitments();
      if (name === 'goals')       loadGoals();
      if (name === 'chat')        $msgInput.focus();
    }

    // ==========================================================================
    // CHAT
    // ==========================================================================
    async function sendToChat(text) {
      const fullMsg = moodPrefix + text;
      moodPrefix = '';
      $checkin.classList.remove('show');
      addUserBubble(text);
      scrollBottom();
      $sendBtn.disabled = true;
      const loader = addLoader();
      try {
        const data = await apiSend(fullMsg);
        loader.remove();
        addCoachBubble(data.reply, data.provider_used, data.intent);
        if (typeof data.streak_days === 'number') {
          streakDays = data.streak_days;
          localStorage.setItem('streak_days', streakDays);
          updateHeader();
        }
        localStorage.setItem('last_message_date', today());
        if (data.intent === 'task_request') setTimeout(() => updateChaseBadge(), 800);
      } catch (_) {
        loader.remove();
        addCoachBubble('Connection lost. Check your server is running.', null, null, true);
      } finally {
        $sendBtn.disabled = false;
        scrollBottom();
      }
    }

    function addUserBubble(text) {
      const row = Object.assign(document.createElement('div'), { className: 'msg user' });
      const bub = Object.assign(document.createElement('div'), { className: 'bubble' });
      bub.textContent = text;
      row.appendChild(bub);
      $messages.appendChild(row);
    }

    function addCoachBubble(text, provider, intent, isError = false) {
      const row = Object.assign(document.createElement('div'), { className: 'msg coach' });
      const bub = Object.assign(document.createElement('div'), { className: `bubble${isError ? ' error' : ''}` });
      bub.textContent = text;
      row.appendChild(bub);
      if (!isError && (provider || (intent && intent !== 'onboarding'))) {
        const pills = document.createElement('div');
        pills.className = 'msg-pills';
        if (provider) {
          const p = Object.assign(document.createElement('span'), { className: 'pill pill-provider' });
          p.textContent = provider;
          pills.appendChild(p);
        }
        if (intent && intent !== 'onboarding') {
          const p = Object.assign(document.createElement('span'), { className: `pill pill-intent ${intent}` });
          p.textContent = intent.replace('_', ' ');
          pills.appendChild(p);
        }
        row.appendChild(pills);
      }
      $messages.appendChild(row);
    }

    function addLoader() {
      const el = document.createElement('div');
      el.className = 'dots-bubble';
      el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      $messages.appendChild(el);
      scrollBottom();
      return el;
    }
    function scrollBottom() { $messages.scrollTop = $messages.scrollHeight; }

    // ==========================================================================
    // COMMITMENTS
    // ==========================================================================
    async function loadCommitments() {
      $scrComm.innerHTML = '';
      for (let i = 0; i < 2; i++) { const sk = document.createElement('div'); sk.className = 'skeleton'; $scrComm.appendChild(sk); }
      try {
        const [commRes, goalsRes] = await Promise.all([
          fetch(`${API}/api/commitments/${sessionId}`),
          fetch(`${API}/api/goals/${sessionId}`),
        ]);
        if (!commRes.ok) throw new Error();
        const { commitments } = await commRes.json();
        const goals = goalsRes.ok ? (await goalsRes.json()).goals : [];
        renderCommitments(commitments, goals);
      } catch (_) {
        $scrComm.innerHTML = '';
        appendEmptyState($scrComm, '⚠️', "Couldn't load habits", 'Check your server is running.');
      }
    }

    function renderCommitments(commitments, goals) {
      $scrComm.innerHTML = '';
      const logs = getTodayLogs();

      if (commitments.length === 0) {
        appendEmptyState($scrComm, '🎯', 'No habits yet', 'Tell your coach what you want to commit to and it\'ll show up here automatically.');
        return;
      }

      // Build goal lookup
      const goalMap = {};
      goals.forEach(g => goalMap[g.id] = g.title);

      // Group by goal_id (null = no goal)
      const grouped = {};
      commitments.forEach(c => {
        const key = c.goal_id || '__none__';
        (grouped[key] = grouped[key] || []).push(c);
      });

      // Render goal-linked groups first, then unlinked
      const goalOrder = goals.map(g => g.id).filter(id => grouped[id]);
      if (grouped['__none__']) goalOrder.push('__none__');

      goalOrder.forEach(key => {
        const label = key === '__none__' ? 'No Goal' : goalMap[key] || 'Unknown Goal';
        addSectionLabel(label);
        // Due today first
        const sorted = [...grouped[key]].sort((a, b) => (b.due_today ? 1 : 0) - (a.due_today ? 1 : 0));
        sorted.forEach(c => $scrComm.appendChild(buildCard(c, logs[c.id])));
      });
    }

    function addSectionLabel(text) {
      const el = document.createElement('div');
      el.className = 'section-label';
      el.textContent = text;
      $scrComm.appendChild(el);
    }

    function buildCard(c, loggedStatus, showActions = true) {
      const card = document.createElement('div');
      const alreadyLogged = !!loggedStatus;
      card.className = `cc${alreadyLogged ? ' logged' : ''}`;

      const isAbstain = c.type === 'abstain';
      const isOneTime = c.type === 'one-time';
      const streakIcon  = isAbstain ? '✨' : isOneTime ? '' : '🔥';
      const streakLabel = isAbstain ? `${streakIcon} ${c.streak}d clean` : c.streak > 0 ? `${streakIcon} ${c.streak}d` : '';
      const freqLabel   = formatFreq(c);
      const dueBadge    = c.due_today ? '' : '';

      card.innerHTML = `
        <div class="cc-top">
          <div class="cc-top-left">
            <span class="cc-type ${c.type}">${c.type}</span>
            <span class="cc-title">${escHtml(c.title)}</span>
          </div>
          ${streakLabel ? `<span class="cc-streak ${c.type}">${streakLabel}</span>` : ''}
        </div>
        <div class="cc-bottom">
          <span class="cc-freq">${freqLabel}${c.due_today ? ' · <span style="color:var(--purple);font-weight:600">today</span>' : ''}</span>
          <div class="cc-actions"></div>
        </div>`;

      const $actions = card.querySelector('.cc-actions');
      if (!showActions) return card;

      if (alreadyLogged) {
        const chip = document.createElement('span');
        chip.className = `cc-status-chip ${loggedStatus}`;
        chip.textContent = loggedStatus === 'completed' ? '✓ Done' : loggedStatus === 'lapsed' ? '✗ Lapsed' : 'Skipped';
        $actions.appendChild(chip);
      } else if (c.due_today) {
        const doneLabel   = isAbstain ? '✓ Clean'   : '✓ Done';
        const lapsedLabel = isAbstain ? '✗ Slipped' : '✗ Lapsed';
        $actions.appendChild(makeLogBtn(doneLabel,   'done',   () => commitLog(c.id, 'completed', card, $actions)));
        if (!isOneTime) $actions.appendChild(makeLogBtn(lapsedLabel, 'lapsed', () => commitLog(c.id, 'lapsed', card, $actions)));
      }

      return card;
    }

    function makeLogBtn(label, cls, handler) {
      const btn = document.createElement('button');
      btn.className = `cc-btn ${cls}`;
      btn.textContent = label;
      btn.addEventListener('click', handler);
      return btn;
    }

    async function commitLog(id, status, cardEl, actionsEl) {
      actionsEl.querySelectorAll('button').forEach(b => b.disabled = true);
      try {
        const res = await fetch(`${API}/api/commitments/${id}/log`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, status }),
        });
        if (!res.ok) throw new Error();
        setTodayLog(id, status);
        cardEl.classList.add('logged');
        actionsEl.innerHTML = '';
        const chip = document.createElement('span');
        chip.className = `cc-status-chip ${status}`;
        chip.textContent = status === 'completed' ? '✓ Done' : '✗ Lapsed';
        actionsEl.appendChild(chip);
        updateChaseBadge();
      } catch (_) {
        actionsEl.querySelectorAll('button').forEach(b => b.disabled = false);
      }
    }

    // ── Chase badge ────────────────────────────────────────────────────────────
    async function updateChaseBadge() {
      try {
        const res = await fetch(`${API}/api/chase/${sessionId}`);
        if (!res.ok) return;
        const { unlogged } = await res.json();
        const count = unlogged.length;
        $chaseBadge.textContent = count;
        $chaseBadge.classList.toggle('hidden', count === 0);
      } catch (_) {}
    }

    // ==========================================================================
    // GOALS
    // ==========================================================================
    async function loadGoals() {
      $scrGoals.innerHTML = '';
      const sk = document.createElement('div'); sk.className = 'skeleton'; $scrGoals.appendChild(sk);
      try {
        const res = await fetch(`${API}/api/goals/${sessionId}`);
        if (!res.ok) throw new Error();
        const { goals } = await res.json();
        renderGoals(goals);
      } catch (_) {
        $scrGoals.innerHTML = '';
        appendEmptyState($scrGoals, '⚠️', "Couldn't load goals", 'Check your server is running.');
      }
    }

    function renderGoals(goals) {
      $scrGoals.innerHTML = '';

      if (goals.length === 0) {
        appendEmptyState($scrGoals, '🎯', 'No goals yet', 'Add your first goal below.');
      } else {
        addSectionLabelTo($scrGoals, 'Active Goals');
        goals.forEach(g => $scrGoals.appendChild(buildGoalCard(g)));
      }

      // Add goal row (always shown)
      const row = document.createElement('div');
      row.className = 'add-goal-row';
      row.innerHTML = `<input class="add-goal-input" id="new-goal-input" placeholder="Add a new goal…" type="text">
                       <button class="add-goal-btn" id="add-goal-btn">Add</button>`;
      $scrGoals.appendChild(row);

      const $input = document.getElementById('new-goal-input');
      const $btn   = document.getElementById('add-goal-btn');

      $btn.addEventListener('click', () => submitGoal($input, $btn));
      $input.addEventListener('keydown', e => { if (e.key === 'Enter') submitGoal($input, $btn); });
    }

    function buildGoalCard(g) {
      const card = document.createElement('div');
      card.className = 'goal-card';
      card.innerHTML = `<span class="goal-card-title">${escHtml(g.title)}</span>
                        <button class="goal-remove-btn" data-id="${g.id}">Remove</button>`;
      card.querySelector('.goal-remove-btn').addEventListener('click', () => removeGoal(g.id, card));
      return card;
    }

    async function submitGoal($input, $btn) {
      const title = $input.value.trim();
      if (!title) return;
      $btn.disabled = true;
      $btn.textContent = '…';
      try {
        const res = await fetch(`${API}/api/goals`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, title }),
        });
        if (!res.ok) throw new Error();
        $input.value = '';
        await loadGoals();
      } catch (_) {
        $btn.disabled = false;
        $btn.textContent = 'Add';
      }
    }

    async function removeGoal(id, cardEl) {
      cardEl.style.opacity = '0.4';
      try {
        const res = await fetch(`${API}/api/goals/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId }),
        });
        if (!res.ok) throw new Error();
        await loadGoals();
      } catch (_) {
        cardEl.style.opacity = '';
      }
    }

    function addSectionLabelTo(container, text) {
      const el = document.createElement('div');
      el.className = 'section-label';
      el.textContent = text;
      container.appendChild(el);
    }

    // ==========================================================================
    // HELPERS
    // ==========================================================================
    function appendEmptyState(container, icon, title, sub) {
      const el = document.createElement('div');
      el.className = 'empty-state';
      el.innerHTML = `<div class="empty-icon">${icon}</div>
                      <div class="empty-title">${title}</div>
                      <div class="empty-sub">${sub}</div>`;
      container.appendChild(el);
    }

    function formatFreq(c) {
      if (c.frequency === 'daily')         return 'Daily';
      if (c.frequency === 'weekly')        return 'Weekly';
      if (c.frequency === 'one-time')      return c.due_date ? `Due ${c.due_date}` : 'One-time';
      if (c.frequency === 'specific_days') return (c.days_of_week || []).map(d => d[0].toUpperCase() + d.slice(1)).join(', ');
      return '';
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ==========================================================================
    // API
    // ==========================================================================
    async function apiSend(message) {
      const res = await fetch(`${API}/api/coach`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }
  </script>
</body>
</html>
